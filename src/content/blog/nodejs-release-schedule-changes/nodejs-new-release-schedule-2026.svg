<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400" role="img" aria-labelledby="title desc">
  <title id="title">Node.js release schedule from 2026, under the new annual model</title>
  <desc id="desc">Timeline comparing Node.js 26 (last release of the old model) with Node.js 27, 28 and 29 under the new annual model. Each new release starts with a 6-month Alpha phase, then 6 months as Current, then enters LTS for 30 months.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .current { fill: #5fa04e; }
      .lts { fill: #229ad6; }
      .maintenance { fill: #b1bcc2; }
      .alpha { fill: #e99c40; }
      .row-label { fill: #1a2b29; font: 600 15px sans-serif; text-anchor: end; dominant-baseline: middle; }
      .tick text { font: 12px sans-serif; fill: #5b6b69; text-anchor: middle; }
      .tick line { stroke: #e1e7e7; }
      .tick line.major { stroke: #c4cfce; }
      .bar-label { fill: #fff; font: 600 12px sans-serif; text-transform: uppercase; letter-spacing: 0.04em; dominant-baseline: middle; }
      .legend text { font: 13px sans-serif; fill: #3a4947; dominant-baseline: middle; }
    ]]></style>
  </defs>

  <g transform="translate(110, 56)">
    <!-- x-axis ticks (every 6 months, Apr / Oct) -->
    <g class="axis">
      <g class="tick"><line class="major" x1="0" x2="0" y1="-8" y2="256"></line><text x="0" y="-16">Apr 26</text></g>
      <g class="tick"><line x1="68.3" x2="68.3" y1="-8" y2="256"></line><text x="68.3" y="-16">Oct 26</text></g>
      <g class="tick"><line class="major" x1="136.7" x2="136.7" y1="-8" y2="256"></line><text x="136.7" y="-16">Apr 27</text></g>
      <g class="tick"><line x1="205" x2="205" y1="-8" y2="256"></line><text x="205" y="-16">Oct 27</text></g>
      <g class="tick"><line class="major" x1="273.3" x2="273.3" y1="-8" y2="256"></line><text x="273.3" y="-16">Apr 28</text></g>
      <g class="tick"><line x1="341.7" x2="341.7" y1="-8" y2="256"></line><text x="341.7" y="-16">Oct 28</text></g>
      <g class="tick"><line class="major" x1="410" x2="410" y1="-8" y2="256"></line><text x="410" y="-16">Apr 29</text></g>
      <g class="tick"><line x1="478.3" x2="478.3" y1="-8" y2="256"></line><text x="478.3" y="-16">Oct 29</text></g>
      <g class="tick"><line class="major" x1="546.7" x2="546.7" y1="-8" y2="256"></line><text x="546.7" y="-16">Apr 30</text></g>
      <g class="tick"><line x1="615" x2="615" y1="-8" y2="256"></line><text x="615" y="-16">Oct 30</text></g>
      <g class="tick"><line class="major" x1="683.3" x2="683.3" y1="-8" y2="256"></line><text x="683.3" y="-16">Apr 31</text></g>
      <g class="tick"><line x1="751.7" x2="751.7" y1="-8" y2="256"></line><text x="751.7" y="-16">Oct 31</text></g>
      <g class="tick"><line class="major" x1="820" x2="820" y1="-8" y2="256"></line><text x="820" y="-16">Apr 32</text></g>
    </g>

    <!-- Node.js 26 (last release of the old model) -->
    <text class="row-label" x="-12" y="40">Node.js 26</text>
    <rect class="current" x="0" y="20" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="8" y="41">Current</text>
    <rect class="lts" x="68.3" y="20" width="136.7" height="40" rx="3"></rect>
    <text class="bar-label" x="76.3" y="41">Active LTS</text>
    <rect class="maintenance" x="205" y="20" width="205" height="40" rx="3"></rect>
    <text class="bar-label" x="213" y="41">Maintenance</text>

    <!-- Node.js 27 (first release of the new model) -->
    <text class="row-label" x="-12" y="104">Node.js 27</text>
    <rect class="alpha" x="68.3" y="84" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="76.3" y="105">Alpha</text>
    <rect class="current" x="136.7" y="84" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="144.7" y="105">Current</text>
    <rect class="lts" x="205" y="84" width="341.7" height="40" rx="3"></rect>
    <text class="bar-label" x="213" y="105">LTS</text>

    <!-- Node.js 28 -->
    <text class="row-label" x="-12" y="168">Node.js 28</text>
    <rect class="alpha" x="205" y="148" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="213" y="169">Alpha</text>
    <rect class="current" x="273.3" y="148" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="281.3" y="169">Current</text>
    <rect class="lts" x="341.7" y="148" width="341.7" height="40" rx="3"></rect>
    <text class="bar-label" x="349.7" y="169">LTS</text>

    <!-- Node.js 29 -->
    <text class="row-label" x="-12" y="232">Node.js 29</text>
    <rect class="alpha" x="341.7" y="212" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="349.7" y="233">Alpha</text>
    <rect class="current" x="410" y="212" width="68.3" height="40" rx="3"></rect>
    <text class="bar-label" x="418" y="233">Current</text>
    <rect class="lts" x="478.3" y="212" width="341.7" height="40" rx="3"></rect>
    <text class="bar-label" x="486.3" y="233">LTS</text>

    <!-- legend -->
    <g class="legend" transform="translate(0, 296)">
      <rect class="alpha" x="0" y="0" width="16" height="16" rx="3"></rect>
      <text x="22" y="9">Alpha (6 months, testing only)</text>
      <rect class="current" x="230" y="0" width="16" height="16" rx="3"></rect>
      <text x="252" y="9">Current (6 months)</text>
      <rect class="lts" x="410" y="0" width="16" height="16" rx="3"></rect>
      <text x="432" y="9">LTS (30 months)</text>
      <rect class="maintenance" x="560" y="0" width="16" height="16" rx="3"></rect>
      <text x="582" y="9">Maintenance (old model)</text>
    </g>
  </g>
</svg>
